<!-- Excel Import Modal -->
<div
  class="modal fade"
  id="excelImportModal"
  tabindex="-1"
  aria-labelledby="excelImportModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="excelImportModalLabel">
          <i class="fas fa-file-excel text-success me-2"></i>Excel Data Import
        </h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <div class="alert alert-info">
          <i class="fas fa-info-circle me-2"></i>
          <strong>Import Data:</strong>
          <span id="importDataTypeLabel">Select data type to import</span>
        </div>

        <form id="excelImportForm" enctype="multipart/form-data">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          <div class="row g-3">
            <!-- File Selection -->
            <div class="col-md-6">
              <label for="excel_file" class="form-label"
                >Select Excel File (.xlsx, .xls):</label
              >
              <input
                type="file"
                class="form-control"
                id="excel_file"
                name="excel_file"
                accept=".xlsx,.xls"
                required
              />
            </div>

            <!-- Import Format -->
            <div class="col-md-6">
              <label for="import_adapter" class="form-label"
                >Import Format:</label
              >
              <select
                class="form-select"
                id="import_adapter"
                name="import_adapter"
                required
              >
                <option value="" disabled selected>Loading formats…</option>
              </select>
            </div>
          </div>

          <!-- Conflict Resolution Strategy -->
          <div class="row g-3 mt-2">
            <div class="col-12">
              <fieldset>
                <legend class="form-label">
                  Conflict Resolution Strategy:
                </legend>
                <div class="row">
                  <div class="col-md-3">
                    <div class="form-check">
                      <input
                        class="form-check-input"
                        type="radio"
                        name="conflict_strategy"
                        id="use_theirs"
                        value="use_theirs"
                        checked
                      />
                      <label class="form-check-label" for="use_theirs">
                        <strong>Use Import Data</strong><br />
                        <small class="text-muted"
                          >Overwrite existing with imported values</small
                        >
                      </label>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div class="form-check">
                      <input
                        class="form-check-input"
                        type="radio"
                        name="conflict_strategy"
                        id="use_mine"
                        value="use_mine"
                      />
                      <label class="form-check-label" for="use_mine">
                        <strong>Keep Existing</strong><br />
                        <small class="text-muted"
                          >Skip conflicts, keep database data</small
                        >
                      </label>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div class="form-check">
                      <input
                        class="form-check-input"
                        type="radio"
                        name="conflict_strategy"
                        id="merge"
                        value="merge"
                      />
                      <label class="form-check-label" for="merge">
                        <strong>Merge Data</strong><br />
                        <small class="text-muted"
                          >Intelligently combine both</small
                        >
                      </label>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div class="form-check">
                      <input
                        class="form-check-input"
                        type="radio"
                        name="conflict_strategy"
                        id="manual_review"
                        value="manual_review"
                      />
                      <label class="form-check-label" for="manual_review">
                        <strong>Manual Review</strong><br />
                        <small class="text-muted"
                          >Flag conflicts for review</small
                        >
                      </label>
                    </div>
                  </div>
                </div>
              </fieldset>
            </div>
          </div>

          <!-- Options -->
          <div class="row g-3 mt-2">
            <div class="col-md-4">
              <div class="form-check form-switch">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="dry_run"
                  name="dry_run"
                />
                <label class="form-check-label" for="dry_run">
                  <strong>Dry Run (Test Mode)</strong><br />
                  <small class="text-muted"
                    >Preview changes without saving to database</small
                  >
                </label>
              </div>
            </div>
            <div class="col-md-4">
              <div class="form-check form-switch">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="verbose_output"
                  name="verbose_output"
                />
                <label class="form-check-label" for="verbose_output">
                  <strong>Detailed Output</strong><br />
                  <small class="text-muted"
                    >Show detailed progress information</small
                  >
                </label>
              </div>
            </div>
            <div class="col-md-4">
              <div class="form-check form-switch">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="delete_existing_db"
                  name="delete_existing_db"
                />
                <label class="form-check-label" for="delete_existing_db">
                  <strong>⚠️ Delete Existing Database</strong><br />
                  <small class="text-muted"
                    >Clear all data before import (DESTRUCTIVE)</small
                  >
                </label>
              </div>
            </div>
          </div>

          <!-- Hidden field for data type -->
          <input
            type="hidden"
            id="import_data_type"
            name="import_data_type"
            value=""
          />
        </form>

        <!-- Progress Section -->
        <div id="importProgress" class="mt-4" style="display: none">
          <h6>Import Progress</h6>
          <progress
            id="importProgressBar"
            class="w-100"
            value="0"
            max="100"
            style="height: 1.5rem"
            aria-label="Import progress"
          >
            0%
          </progress>
          <div id="importStatus" class="mt-2 small text-muted">
            Ready to start import...
          </div>
        </div>

        <!-- Results Section -->
        <div id="importResults" class="mt-4" style="display: none">
          <h6>Import Results</h6>
          <div id="importResultsContent"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Cancel
        </button>
        <button
          type="button"
          class="btn btn-outline-success"
          id="validateFileBtn"
          onclick="validateImportFile()"
        >
          <i class="fas fa-check-circle me-1"></i>Validate File Only
        </button>
        <button
          type="button"
          class="btn btn-success"
          id="executeImportBtn"
          onclick="executeImport()"
        >
          <i class="fas fa-upload me-1"></i>Execute Import
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  // Global variable to track current import type
  let currentImportType = "";

  // Function to open import modal for specific data type
  function openImportModal(dataType) {
    currentImportType = dataType;
    document.getElementById("import_data_type").value = dataType;

    // Update modal title and description based on data type
    const dataTypeLabels = {
      institutions: "Institution data (names, addresses, contact info)",
      programs: "Academic program data (names, descriptions, requirements)",
      courses: "Course catalog data (titles, descriptions, credit hours)",
      users: "User account data (faculty, staff, administrators)",
      faculty: "Faculty member data (names, departments, contact info)",
      students: "Student enrollment data (names, IDs, program assignments)",
      sections: "Course section data (schedules, instructors, enrollment)",
      assessments:
        "Assessment and outcome data (Learning Outcomes, Program Outcomes, rubrics)",
    };

    document.getElementById("importDataTypeLabel").textContent =
      dataTypeLabels[dataType] || "Selected data type";

    // Populate the import-format dropdown with this institution's adapters
    populateImportAdapters();

    // Show the modal
    const modal = new bootstrap.Modal(
      document.getElementById("excelImportModal"),
    );
    modal.show();
  }

  // Load the import adapters available to the current institution and fill the
  // format dropdown. Falls back gracefully if the request fails.
  function populateImportAdapters() {
    const select = document.getElementById("import_adapter");
    fetch("/api/import/adapters", { credentials: "include" })
      .then((response) => response.json())
      .then((data) => {
        if (!data.success || !Array.isArray(data.adapters)) {
          return;
        }
        select.innerHTML = "";
        if (data.adapters.length === 0) {
          select.innerHTML =
            '<option value="" disabled selected>No import formats available</option>';
          return;
        }
        data.adapters.forEach((adapter, index) => {
          const option = document.createElement("option");
          option.value = adapter.id;
          option.textContent = adapter.name;
          if (index === 0) {
            option.selected = true;
          }
          select.appendChild(option);
        });
      })
      .catch(() => {
        // Leave the loading placeholder; the user can retry by reopening.
      });
  }

  // Function to validate import file
  function validateImportFile() {
    const form = document.getElementById("excelImportForm");
    const formData = new FormData(form);
    formData.set("dry_run", "true"); // Force dry run for validation

    executeImportRequest(formData, true);
  }

  // Function to execute import
  function executeImport() {
    const form = document.getElementById("excelImportForm");
    const formData = new FormData(form);

    executeImportRequest(formData, false);
  }

  // Function to execute import request
  function executeImportRequest(formData, isValidation) {
    // Validate file is selected before proceeding
    const fileInput = document.getElementById("excel_file");
    if (!fileInput.files || fileInput.files.length === 0) {
      alert("Please select an Excel file before proceeding.");
      return;
    }

    // Debug: Log form data contents
    console.log("FormData contents:");
    for (let [key, value] of formData.entries()) {
      console.log(key, value);
    }

    const progressDiv = document.getElementById("importProgress");
    const resultsDiv = document.getElementById("importResults");
    const progressBar = document.getElementById("importProgressBar");
    const statusDiv = document.getElementById("importStatus");
    const resultsContent = document.getElementById("importResultsContent");

    // Show progress, hide results
    progressDiv.style.display = "block";
    resultsDiv.style.display = "none";

    // Reset progress
    progressBar.style.width = "0%";
    progressBar.setAttribute("aria-valuenow", 0);
    progressBar.textContent = "0%";
    statusDiv.textContent = isValidation
      ? "Validating file..."
      : "Starting import...";

    // Disable buttons
    document.getElementById("validateFileBtn").disabled = true;
    document.getElementById("executeImportBtn").disabled = true;

    // Make the API request
    fetch("/api/import/excel", {
      method: "POST",
      body: formData,
      credentials: "include",
    })
      .then((response) => response.json())
      .then((data) => {
        // Real imports run server-side and return a progress_id to poll for
        // live progress. Validation (dry run) returns its result inline.
        if (data.success && data.async && data.progress_id) {
          pollImportProgress(data.progress_id);
          return;
        }
        if (data.success) {
          progressBar.value = 100;
          progressBar.style.width = "100%";
          progressBar.textContent = "100%";
          statusDiv.textContent = "Validation completed!";
          showImportResult({ ok: true, isValidation: isValidation, stats: data });
        } else {
          showImportResult({
            ok: false,
            isValidation: isValidation,
            error: data.error || "Unknown error occurred",
          });
        }
      })
      .catch((error) => {
        showImportResult({
          ok: false,
          isValidation: isValidation,
          error: error.message || "Network error occurred",
        });
      });
  }

  // Poll the server for live import progress and drive the progress bar.
  function pollImportProgress(progressId) {
    const progressBar = document.getElementById("importProgressBar");
    const statusDiv = document.getElementById("importStatus");
    const poll = setInterval(() => {
      fetch(`/api/import/progress/${progressId}`, { credentials: "include" })
        .then((r) => r.json())
        .then((p) => {
          const pct = Math.max(0, Math.min(100, Math.round(p.percentage || 0)));
          progressBar.value = pct;
          progressBar.style.width = pct + "%";
          progressBar.setAttribute("aria-valuenow", pct);
          progressBar.textContent = pct + "%";
          const counts =
            p.total_records > 0
              ? ` (${p.records_processed || 0}/${p.total_records})`
              : "";
          statusDiv.textContent = (p.message || "Working...") + counts;

          if (p.status === "complete") {
            clearInterval(poll);
            showImportResult({ ok: true, isValidation: false, stats: p.result || {} });
            setTimeout(() => window.location.reload(), 2000);
          } else if (p.status === "error") {
            clearInterval(poll);
            showImportResult({
              ok: false,
              isValidation: false,
              error: p.error || "Import failed",
            });
          }
        })
        .catch(() => {
          /* transient network blip; keep polling */
        });
    }, 600);
  }

  // Render the final success/error panel and re-enable the action buttons.
  function showImportResult(opts) {
    const progressDiv = document.getElementById("importProgress");
    const resultsDiv = document.getElementById("importResults");
    const resultsContent = document.getElementById("importResultsContent");
    const label = opts.isValidation ? "Validation" : "Import";

    progressDiv.style.display = "none";
    resultsDiv.style.display = "block";
    document.getElementById("validateFileBtn").disabled = false;
    document.getElementById("executeImportBtn").disabled = false;

    if (opts.ok) {
      const s = opts.stats || {};
      resultsContent.innerHTML = `
            <div class="alert alert-success">
                <i class="fas fa-check-circle me-2"></i>
                <strong>${label} completed successfully!</strong>
                <div class="mt-2">
                    <div>Records processed: ${s.records_processed || 0}</div>
                    <div>Records created: ${s.records_created || 0}</div>
                    <div>Records updated: ${s.records_updated || 0}</div>
                    <div>Records skipped: ${s.records_skipped || 0}</div>
                </div>
            </div>
        `;
    } else {
      resultsContent.innerHTML = `
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-triangle me-2"></i>
                <strong>${label} failed:</strong>
                <div class="mt-2">${opts.error || "Unknown error occurred"}</div>
            </div>
        `;
    }
  }

  // Functions called by dashboard panels
  function importData(dataType) {
    openImportModal(dataType);
  }

  function programImportData(dataType) {
    openImportModal(dataType);
  }

  function institutionImportData(dataType) {
    openImportModal(dataType);
  }

  function quickImport() {
    openImportModal("courses"); // Default to courses for quick import
  }

  function programQuickImport() {
    openImportModal("courses"); // Default to courses for program quick import
  }

  function institutionQuickImport() {
    openImportModal("programs"); // Default to programs for institution quick import
  }
</script>
